spring:
  application:
    name: test.book.library.system
  datasource:
    url: jdbc:h2:mem:mydb # jdbc:postgresql://localhost:5432/library_db
    username: sa # admin
    password: password # admin
    driverClassName: org.h2.Driver # org.postgresql.Driver
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  mvc:
    servlet:
      path: /api

server:
  port: 8080

logging:
  level:
    org.springframework.jdbc.datasource.init: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  paths-to-match:
    - /v1/library/**
